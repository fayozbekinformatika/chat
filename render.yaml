# Telegram Clone — Next.js + Supabase (Render Blueprint)
# Supabase alohida cloud'da; Render faqat frontend/web server.

services:
  - type: web
    name: telegram-chat
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
